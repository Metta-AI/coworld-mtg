name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Install pinned Rust toolchain
        run: rustup toolchain install nightly-2026-04-19 --profile minimal --component rustfmt --component clippy
      - run: npm ci
      - run: scripts/check.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create empty build-only corpus directory
        run: mkdir -p .private/corpus
      - name: Build release image
        run: docker build -f Dockerfile.coworld -t coworld-mtg:ci .
